<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MY LIFE — نظام تشغيل حياتك</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#121212">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ========== TOKENS ========== */

@font-face {
  font-family: 'kuffi';
  font-style: normal;
  font-weight: 400;
  src: url(/assets/fonts/kuffi.ttf) format('truetype')  ;
  unicode-range: U+0600-06FF, U+0750-077F, U+08A0-08FF, U+FB50-FDFF, U+FE70-FEFF, U+1EE00-1EEFF;
}

:root{
  --radius-s:10px; --radius-m:16px; --radius-l:24px; --radius-xl:32px;
  --shadow-s:0 1px 3px rgba(20,30,25,.06), 0 1px 2px rgba(20,30,25,.08);
  --shadow-m:0 8px 24px rgba(20,30,25,.08), 0 2px 6px rgba(20,30,25,.06);
  --shadow-l:0 20px 50px rgba(20,30,25,.16);
  --ease:cubic-bezier(.22,1,.36,1);
}
html[data-theme="light"]{
  --bg:#FBF8F2; --bg-soft:#F3EEE2; --bg-elevated:#FFFFFF; --bg-elevated-2:#FFFEFB;
  --text:#1C2622; --text-muted:#6E7A72; --text-faint:#A4ADA4;
  --border:#E9E2D2; --border-soft:#F0EBDD;
  --primary:#1F6F54; --primary-light:#2FA876; --primary-dim:#E5F1EB;
  --accent:#B6862F; --accent-soft:#F4E9D2;
  --success:#2FA876; --success-soft:#E1F4EB;
  --danger:#C4543F; --danger-soft:#F8E5E0;
  --gold-glow: radial-gradient(circle, rgba(201,162,75,.35), transparent 70%);
}
html[data-theme="dark"]{
  --bg:#0A0F1F; --bg-soft:#101830; --bg-elevated:#141D3A; --bg-elevated-2:#182347;
  --text:#E8ECF8; --text-muted:#9AA6C8; --text-faint:#5C6790;
  --border:#26315A; --border-soft:#1B2547;
  --primary:#36B888; --primary-light:#4ED7A3; --primary-dim:#142A2D;
  --accent:#D8B662; --accent-soft:#241F38;
  --success:#3FCB91; --success-soft:#102A2C;
  --danger:#E58572; --danger-soft:#2B1830;
  --gold-glow: radial-gradient(circle, rgba(216,182,98,.22), transparent 70%);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:'Tajawal',sans-serif;
  -webkit-font-smoothing:antialiased;
  transition:background .35s var(--ease), color .35s var(--ease);
  min-height:100vh; overflow-x:hidden;
}
.font-amiri{font-family:'Amiri',serif;}
.name-font{
    font-family:'kuffi','Amiri',serif !important;
    font-weight:400 !important;
    font-size: 42px !important;
}
::selection{background:var(--primary); color:#fff;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
:focus-visible{outline:2px solid var(--primary); outline-offset:2px;}
@media (prefers-reduced-motion: reduce){ *{animation-duration:.01ms !important; transition-duration:.01ms !important;} }

/* ===== LAYOUT ===== */
.app-shell{display:flex; min-height:100vh; position:relative;}
.sidebar{
  position:fixed; inset-inline-start:0; top:0; bottom:0; width:280px; z-index:60;
  background:var(--bg-elevated); border-inline-end:1px solid var(--border);
  transform:translateX(110%); transition:transform .4s var(--ease);
  display:flex; flex-direction:column; padding:20px 16px;
}
.sidebar.open{transform:translateX(0);}
.sidebar-overlay{
  position:fixed; inset:0; background:rgba(10,14,12,.45); backdrop-filter:blur(2px);
  z-index:55; opacity:0; pointer-events:none; transition:opacity .35s var(--ease);
}
.sidebar-overlay.show{opacity:1; pointer-events:auto;}
.nav-item{
  display:flex; align-items:center; gap:12px; padding:11px 14px; border-radius:var(--radius-s);
  color:var(--text-muted); font-weight:500; font-size:15px; transition:all .2s var(--ease); margin-bottom:2px;
}
.nav-item:hover{background:var(--bg-soft); color:var(--text);}
.nav-item.active{background:var(--primary-dim); color:var(--primary);}
html[data-theme="dark"] .nav-item.active{color:var(--primary-light);}
.nav-item .ic{width:20px; text-align:center; font-size:17px;}

.topbar{
  position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
  padding:14px 18px; background:color-mix(in srgb, var(--bg) 80%, transparent);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--border-soft);
}
.hamburger{
  width:42px; height:42px; border-radius:12px; background:var(--bg-elevated); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:18px; transition:all .2s var(--ease);
}
.hamburger:hover{background:var(--bg-soft); transform:scale(1.04);}
.logo-wrap{display:flex; align-items:center; gap:10px;}
.logo-mark{
  width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--primary), var(--primary-light));
  display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:15px;
  box-shadow:var(--shadow-s);
}
.logo-text{font-weight:900; font-size:17px; letter-spacing:.5px;}

.main{flex:1; max-width:1180px; margin:0 auto; width:100%; padding:0 18px 90px;}
.page{display:none; animation:fadeUp .45s var(--ease);}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}

.card{
  background:var(--bg-elevated); border:1px solid var(--border-soft); border-radius:var(--radius-m);
  box-shadow:var(--shadow-s); padding:18px; transition:transform .25s var(--ease), box-shadow .25s var(--ease);
}
.card:hover{box-shadow:var(--shadow-m);}
.section-title{font-weight:800; font-size:18px; margin:0 0 12px;}
.muted{color:var(--text-muted);}
.pill{
  display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:99px; font-size:12.5px;
  font-weight:700; background:var(--bg-soft); color:var(--text-muted);
}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 18px; border-radius:var(--radius-s);
  border:1px solid var(--border); background:var(--bg-elevated); color:var(--text); font-weight:700; font-size:14px;
  transition:all .2s var(--ease);
}
.btn:hover{background:var(--bg-soft); transform:translateY(-1px);}
.btn-primary{background:var(--primary); border-color:var(--primary); color:#fff;}
.btn-primary:hover{background:var(--primary-light); border-color:var(--primary-light);}
.btn-ghost{border-color:transparent; background:transparent;}
.btn-ghost:hover{background:var(--bg-soft);}
.btn-danger-ghost{border-color:transparent; background:transparent; color:var(--danger);}
.btn-danger-ghost:hover{background:var(--danger-soft);}
.btn-icon{width:38px; height:38px; padding:0; border-radius:11px;}
input,textarea,select{
  width:100%; padding:11px 13px; border-radius:var(--radius-s); border:1px solid var(--border);
  background:var(--bg-soft); color:var(--text); font-family:inherit; font-size:14px; transition:all .2s var(--ease);
}
input:focus,textarea:focus,select:focus{border-color:var(--primary); background:var(--bg-elevated);}
label{font-size:12.5px; font-weight:700; color:var(--text-muted); margin-bottom:5px; display:block;}
.field{margin-bottom:12px;}

/* checkbox-tile (habit rows) */
.habit-row{
  display:flex; align-items:center; gap:14px; padding:13px 14px; border-radius:var(--radius-s);
  border:1px solid var(--border-soft); margin-bottom:8px; background:var(--bg-elevated-2);
  transition:all .25s var(--ease); cursor:pointer; position:relative; overflow:hidden;
}
.habit-row:hover{border-color:var(--primary); transform:translateX(-2px);}
html[dir="rtl"] .habit-row:hover{transform:translateX(2px);}
.habit-row.done{background:var(--success-soft); border-color:var(--success);}
.chk{
  width:24px; height:24px; border-radius:8px; border:2px solid var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; transition:all .25s var(--ease); background:var(--bg-elevated);
}
.habit-row.done .chk{background:var(--success); border-color:var(--success); color:#fff; transform:scale(1.05);}
.habit-row .label{font-weight:600; font-size:15px; flex:1;}
.habit-row.done .label{color:var(--success); text-decoration:line-through; text-decoration-thickness:1.5px; opacity:.8;}
@keyframes pop{0%{transform:scale(1);} 40%{transform:scale(1.18);} 100%{transform:scale(1);}}
.pop{animation:pop .35s var(--ease);}

/* progress ring */
.ring-wrap{position:relative; width:170px; height:170px; margin:0 auto;}
.ring-wrap svg{transform:rotate(-90deg); width:100%; height:100%;}
.ring-bg{fill:none; stroke:var(--border-soft); stroke-width:11;}
.ring-fg{fill:none; stroke:url(#ringGrad); stroke-width:11; stroke-linecap:round; transition:stroke-dashoffset .8s var(--ease);}
.ring-center{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;}
.ring-pct{font-size:30px; font-weight:900;}
.ring-label{font-size:12px; color:var(--text-muted); font-weight:600;}

/* bars */
.bar-track{height:9px; border-radius:99px; background:var(--bg-soft); overflow:hidden;}
.bar-fill{height:100%; border-radius:99px; background:linear-gradient(90deg, var(--primary), var(--primary-light)); transition:width .7s var(--ease);}

/* grid */
.grid{display:grid; gap:14px;}
.grid-2{grid-template-columns:repeat(2,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:760px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr 1fr;}}
@media(max-width:520px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}

/* toast / motivation */
.toast{
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); z-index:200;
  background:var(--bg-elevated); border:1px solid var(--primary); color:var(--primary); font-weight:700;
  padding:13px 22px; border-radius:99px; box-shadow:var(--shadow-l); opacity:0; transition:all .4s var(--ease);
  display:flex; align-items:center; gap:8px; max-width:90vw; text-align:center;
}
html[data-theme="dark"] .toast{color:var(--primary-light);}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

/* celebration overlay */
.celebrate-overlay{
  position:fixed; inset:0; z-index:300; display:none; align-items:center; justify-content:center;
  background:rgba(10,16,13,.7); backdrop-filter:blur(6px);
}
.celebrate-overlay.show{display:flex;}
.celebrate-card{
  position:relative; background:var(--bg-elevated); border-radius:var(--radius-xl); padding:42px 30px;
  text-align:center; max-width:380px; width:90%; box-shadow:var(--shadow-l); overflow:hidden;
  animation:celebrateIn .5s var(--ease);
}
@keyframes celebrateIn{from{opacity:0; transform:scale(.85) translateY(20px);} to{opacity:1; transform:scale(1) translateY(0);}}
.celebrate-glow{position:absolute; inset:-40%; background:var(--gold-glow); pointer-events:none;}
.celebrate-badge{
  width:84px; height:84px; border-radius:50%; margin:0 auto 16px; display:flex; align-items:center; justify-content:center;
  font-size:40px; background:linear-gradient(135deg, var(--accent), var(--primary)); box-shadow:0 0 0 8px var(--accent-soft);
  animation:badgePulse 1.8s ease-in-out infinite;
}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 8px var(--accent-soft);} 50%{box-shadow:0 0 0 14px transparent;}}
.confetti-piece{position:absolute; top:-10px; border-radius:2px; opacity:.9; animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(540deg); opacity:0;}}

/* badge tile */
.badge-tile{
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; padding:18px 10px;
  border-radius:var(--radius-m); border:1px solid var(--border-soft); background:var(--bg-elevated-2);
}
.badge-tile .ic{font-size:30px;}
.badge-tile.locked{opacity:.35; filter:grayscale(1);}

/* misc */
.hero-greeting{
  background:linear-gradient(145deg, var(--primary-dim), var(--bg-elevated) 60%); border:1px solid var(--border-soft);
  border-radius:var(--radius-l); padding:24px 24px 92px; position:relative; overflow:hidden; margin-bottom:16px;
}
.hero-greeting::after{
  content:""; position:absolute; inset-inline-end:-60px; top:-60px; width:200px; height:200px; border-radius:50%;
  background:var(--gold-glow);
}
.hero-text{position:relative; z-index:2;}
.mosque-deco{
  position:absolute; inset-inline-start:0; inset-inline-end:0; bottom:0; width:100%; height:78px;
  z-index:1; opacity:.4; pointer-events:none;
}
html[data-theme="dark"] .mosque-deco{opacity:.3;}
.tab-row{display:flex; gap:8px; margin-bottom:16px; overflow-x:auto; padding-bottom:2px;}
.tab-btn{
  padding:9px 16px; border-radius:99px; border:1px solid var(--border); font-weight:700; font-size:13.5px;
  white-space:nowrap; color:var(--text-muted); background:var(--bg-elevated);
}
.tab-btn.active{background:var(--primary); border-color:var(--primary); color:#fff;}
.seg-toggle{display:flex; gap:8px;}
.seg-toggle input{position:absolute; opacity:0; width:0; height:0; pointer-events:none;}
.seg-toggle label{
  flex:1; text-align:center; padding:11px 16px; border-radius:99px; border:1px solid var(--border); font-weight:700; font-size:14px;
  color:var(--text-muted); background:var(--bg-elevated); cursor:pointer; transition:all .2s var(--ease); user-select:none;
}
.seg-toggle input:checked + label{background:var(--primary); border-color:var(--primary); color:#fff;}
.seg-toggle input#txTypeIncome:checked + label{background:var(--success); border-color:var(--success);}
.empty-state{text-align:center; padding:40px 16px; color:var(--text-muted);}
.empty-state .ic{font-size:38px; margin-bottom:10px; opacity:.6;}
.modal-overlay{position:fixed; inset:0; background:rgba(10,16,13,.5); backdrop-filter:blur(3px); z-index:250; display:none; align-items:flex-end; justify-content:center;}
.modal-overlay.show{display:flex;}
@media(min-width:640px){.modal-overlay{align-items:center;}}
.modal{
  background:var(--bg-elevated); width:100%; max-width:480px; border-radius:var(--radius-l) var(--radius-l) 0 0;
  padding:22px; max-height:88vh; overflow-y:auto; animation:modalUp .35s var(--ease);
}
@media(min-width:640px){.modal{border-radius:var(--radius-l);}}
@keyframes modalUp{from{transform:translateY(40px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;}
.modal-head h3{margin:0; font-size:18px; font-weight:800;}
.star-row{display:flex; gap:4px; font-size:22px;}
.star{color:var(--border); cursor:pointer; transition:color .15s;}
.star.on{color:var(--accent);}
.fab{
  position:fixed; bottom:24px; inset-inline-end:24px; z-index:30; width:56px; height:56px; border-radius:50%;
  background:var(--primary); color:#fff; font-size:26px; display:flex; align-items:center; justify-content:center;
  box-shadow:var(--shadow-l); transition:all .25s var(--ease); border:none;
}
.fab:hover{transform:scale(1.07); background:var(--primary-light);}
.status-dot{width:8px; height:8px; border-radius:50%; display:inline-block;}
.theme-toggle{
  width:42px; height:42px; border-radius:12px; background:var(--bg-elevated); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center; font-size:17px;
}
.skel{background:linear-gradient(90deg, var(--bg-soft), var(--border-soft), var(--bg-soft)); background-size:200% 100%; animation:shimmer 1.4s infinite;}
@keyframes shimmer{to{background-position:-200% 0;}}
.chart-bars{display:flex; align-items:flex-end; gap:8px; height:120px; padding-top:10px;}
.chart-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px;}
.chart-fill{width:100%; border-radius:6px 6px 0 0; background:linear-gradient(180deg, var(--primary-light), var(--primary)); transition:height .6s var(--ease); min-height:3px;}
.chart-lbl{font-size:11px; color:var(--text-muted); font-weight:600;}
.streak-flame{font-size:22px;}
.focus-task{display:flex; align-items:center; gap:10px; padding:12px; border-radius:var(--radius-s); border:1px solid var(--border-soft); margin-bottom:8px;}
.pomo-ring{width:220px; height:220px; margin:0 auto;}
</style>
</head>
<body>

<div id="app" class="app-shell"></div>

<div id="toast" class="toast"></div>
<div id="celebrateOverlay" class="celebrate-overlay"></div>
<div id="modalOverlay" class="modal-overlay"></div>

<script>
/* =====================================================================
   MY LIFE — personal productivity app
   Vanilla JS, single file, persisted via window.storage (per-user, private)
   ===================================================================== */

/* ---------- tiny utils ---------- */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => [...root.querySelectorAll(sel)];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const todayKey = (d=new Date()) => d.toISOString().slice(0,10);
const clamp = (n,a,b) => Math.max(a, Math.min(b,n));
const esc = (s='') => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const GREG_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const WEEKDAYS_AR = ['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const HIJRI_MONTHS = ['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

function hijriDate(date=new Date()){
  try{
    const f = new Intl.DateTimeFormat('en-TN-u-ca-islamic', {day:'numeric', month:'numeric', year:'numeric'});
    const parts = f.formatToParts(date).reduce((a,p)=>(a[p.type]=p.value,a),{});
    const m = parseInt(parts.month,10)-1;
    return `${parts.day} ${HIJRI_MONTHS[m] || ''} ${parts.year}هـ`;
  }catch(e){ return ''; }
}
function gregorianStr(date=new Date()){
  return `${WEEKDAYS_AR[date.getDay()]}، ${date.getDate()} ${GREG_MONTHS[date.getMonth()]} ${date.getFullYear()}`;
}

/* ---------- storage layer (window.storage, private/per-user) ---------- */
const LOCAL_PREFIX = 'mylife:';
const hasCloudStorage = () => (typeof window.storage !== 'undefined') && window.storage && typeof window.storage.get === 'function';
const Store = {
  async get(key, fallback){
    if(hasCloudStorage()){
      try{
        const r = await window.storage.get(key, false);
        if(r) return JSON.parse(r.value);
      }catch(e){}
    }
    try{
      const raw = localStorage.getItem(LOCAL_PREFIX+key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  },
  async set(key, value){
    try{ localStorage.setItem(LOCAL_PREFIX+key, JSON.stringify(value)); }catch(e){}
    if(hasCloudStorage()){
      try{ await window.storage.set(key, JSON.stringify(value), false); }
      catch(e){ console.error('cloud storage set failed, using local backup', key, e); }
    }
  }
};

/* ---------- in-memory cache (loaded at boot) ---------- */
const DB = {
  settings: { theme:'light', username:'عثمان' },
  prayerHistory: {},
  quranProgress: {},
  books: [],
  journal: [],
  courses: [],
  lessons: [],
  goals2026: [],
  focusTasks: {},
  achievementsSeen: [],
  wallet: { instapay: 0, cash: 0 },
  transactions: []
};

const HABIT_KEYS = ['fajr','dhuhr','asr','maghrib','isha','sFajr','sDhuhr','sMaghrib','sIsha','duha','witr','qiyam','adhkarS','adhkarM','quranWird'];
const OBLIGATORY = ['fajr','dhuhr','asr','maghrib','isha'];

function emptyDay(){ const o={}; HABIT_KEYS.forEach(k=>o[k]=false); return o; }
function getDay(key){ if(!DB.prayerHistory[key]) DB.prayerHistory[key]=emptyDay(); return DB.prayerHistory[key]; }

async function loadAll(){
  DB.settings = await Store.get('settings', { theme:'light', username:'عثمان' });
  DB.prayerHistory = await Store.get('prayer-history', {});
  DB.quranProgress = await Store.get('quran-progress', {});
  DB.books = await Store.get('books', []);
  DB.journal = await Store.get('journal-entries', []);
  DB.courses = await Store.get('courses', []);
  DB.lessons = await Store.get('islamic-lessons', []);
  DB.goals2026 = await Store.get('goals-2026', []);
  DB.focusTasks = await Store.get('focus-tasks', {});
  DB.achievementsSeen = await Store.get('achievements-seen', []);
  DB.wallet = await Store.get('wallet', { instapay: 0, cash: 0 });
  DB.transactions = await Store.get('transactions', []);
}
const persist = {
  settings: () => Store.set('settings', DB.settings),
  prayerHistory: () => Store.set('prayer-history', DB.prayerHistory),
  quranProgress: () => Store.set('quran-progress', DB.quranProgress),
  books: () => Store.set('books', DB.books),

  courses: () => Store.set('courses', DB.courses),

function exportBackup(){
  const backup = {
    exportedAt: new Date().toISOString(),
    settings: DB.settings,
    prayerHistory: DB.prayerHistory,
    quranProgress: DB.quranProgress,
    books: DB.books,
    journal: DB.journal,
    courses: DB.courses,
    lessons: DB.lessons,
    goals2026: DB.goals2026,
    focusTasks: DB.focusTasks,
    achievementsSeen: DB.achievementsSeen,
    wallet: DB.wallet,
    transactions: DB.transactions
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `my-life-backup-${todayKey()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showToast('تم تنزيل نسخة احتياطية','💾');
}
async function importBackup(file){
  if(!file) return;
  try{
    const text = await file.text();
    const backup = JSON.parse(text);
    if(backup.settings) DB.settings = backup.settings;
    if(backup.prayerHistory) DB.prayerHistory = backup.prayerHistory;
    if(backup.quranProgress) DB.quranProgress = backup.quranProgress;
    if(backup.books) DB.books = backup.books;
    if(backup.journal) DB.journal = backup.journal;
    if(backup.courses) DB.courses = backup.courses;
    if(backup.lessons) DB.lessons = backup.lessons;
    if(backup.goals2026) DB.goals2026 = backup.goals2026;
    if(backup.focusTasks) DB.focusTasks = backup.focusTasks;
    if(backup.achievementsSeen) DB.achievementsSeen = backup.achievementsSeen;
    if(backup.wallet) DB.wallet = backup.wallet;
    if(backup.transactions) DB.transactions = backup.transactions;
    await Promise.all(Object.values(persist).map(fn=>fn()));
    applyTheme();
    closeModal();
    renderApp();
    showToast('تم استرجاع بياناتك بنجاح','✅');
  }catch(e){
    showToast('حصل خطأ، تأكد إن الملف نسخة احتياطية صحيحة','⚠️');
  }
}

function dayCompletionPct(day){
  const done = HOME_PCT_KEYS.filter(k=>day[k]).length;
  return Math.round((done/HOME_PCT_KEYS.length)*100);
}
function allObligatoryDone(day){

function toggleHabit(key){

    if(OBLIGATORY.includes(key) && allObligatoryDone(day)){
      setTimeout(celebrateFullScreen, 350);
    }
  }
  renderHome();
}
function computeStreak(){
  let streak=0;
  let d=new Date();
  while(true){
    const day = DB.prayerHistory[todayKey(d)];
    if(day && allObligatoryDone(day)){
      streak++;
      d.setDate(d.getDate()-1);
    } else break;
  }
  return streak;
}
function computeLongestStreak(){
  const dates = Object.keys(DB.prayerHistory).filter(k=>allObligatoryDone(DB.prayerHistory[k])).sort();
  let longest=0, cur=0, prev=null;
  for(const ds of dates){
    const d = new Date(ds);
    if(prev && (d - prev)/86400000 === 1) cur++;
    else cur=1;
    longest = Math.max(longest,cur);
    prev=d;
  }
  return longest;
}
function totalCompletedDays(){
  return Object.values(DB.prayerHistory).filter(allObligatoryDone).length;
}
function last7DaysPct(){
  const out=[];
  for(let i=6;i>=0;i--){
    const d = new Date();

    const day = DB.prayerHistory[todayKey(d)] || emptyDay();
    out.push({label:WEEKDAYS_AR[d.getDay()].slice(0,3), pct:dayCompletionPct(day)});
  }
  return out;
}

/* ====================== ACHIEVEMENTS ====================== */
const BADGES = [
  {id:'first_step', title:'البداية المباركة', desc:'أتممت فرائض يوم واحد كاملة', ic:'🌱'},
  {id:'streak_3', title:'المثابر', desc:'حافظت على الالتزام الكامل 3 أيام متتالية', ic:'🔥'},
  {id:'streak_7', title:'المستمسك بالعروة', desc:'حافظت على الالتزام الكامل 7 أيام متتالية', ic:'👑'},
  {id:'quran_start', title:'أهل القرآن', desc:'بدأت تسجيل ورد حفظ القرآن الكريم', ic:'📖'},
  {id:'book_one', title:'قارئ نهم', desc:'قمت بتحديث كتاب واحد في مكتبتك', ic:'📚'},
  {id:'lesson_one', title:'طالب العلم', desc:'قيدت أول درس إسلامي مفيد لك', ic:'🕌'},
];
function checkAchievements(){
  const totalDays = totalCompletedDays();
  const streak = computeStreak();
  const hasQuran = !!DB.quranProgress.surah;
  const hasBooks = DB.books.some(b=>b.progress > 0);
  const hasLessons = DB.lessons.length > 0;

  const unlocked = [];
  if(totalDays >= 1) unlocked.push('first_step');
  if(streak >= 3) unlocked.push('streak_3');
  if(streak >= 7) unlocked.push('streak_7');
  if(hasQuran) unlocked.push('quran_start');
  if(hasBooks) unlocked.push('book_one');
  if(hasLessons) unlocked.push('lesson_one');

  unlocked.forEach(id=>{
    if(!DB.achievementsSeen.includes(id)){
      DB.achievementsSeen.push(id);
      persist.achievementsSeen();
      const b = BADGES.find(x=>x.id===id);
      if(b) setTimeout(()=>showToast(`إنجاز جديد: ${b.title} — ${b.desc}`, b.ic), 1200);
    }
  });
}
function renderAchievements(){
  const a = $('#page-achievements');
  checkAchievements();
  a.innerHTML = `
    <div style="text-align:center; margin-bottom:24px;">
      <h2 style="margin:0 0 4px 0; font-weight:800;">🏆 لوحة الأوسمة والإنجازات</h2>
      <p class="muted" style="font-size:14px;">أوسمتك تزيد وتضيء كلما زاد التزامك اليومي بفرائضك وقراءتك وطلبك للعلم.</p>
    </div>
    <div class="grid grid-3">${BADGES.map(b=>{
      const isLocked = !DB.achievementsSeen.includes(b.id);
      return `
        <div class="badge-tile ${isLocked?'locked':''}">
          <div class="ic">${b.ic}</div>
          <div style="font-weight:800; font-size:15px; margin-top:4px;">${esc(b.title)}</div>
          <div class="muted" style="font-size:12px; margin-top:2px; line-height:1.4;">${esc(b.desc)}</div>
        </div>
      `;
    }).join('')}</div>
  `;
}

/* ====================== FOCUS CENTER ====================== */
let pomoTimeLeft = 25 * 60;
let pomoMode = 'work'; // 'work' or 'short'
let pomoTimerId = null;
function renderFocus(){
  const f = $('#page-focus');
  const tk = todayKey();
  const list = DB.focusTasks[tk] || [];

  f.innerHTML = `
    <div class="grid grid-2">
      <div class="card" style="text-align:center; display:flex; flex-direction:column; justify-content:center;">
        <h3 class="section-title" style="margin-bottom:16px;">⏱️ مؤقت الطماطم (Pomodoro)</h3>
        <div style="font-size:54px; font-weight:900; font-variant-numeric: tabular-nums; margin:10px 0; letter-spacing:1px;" id="pomoDisplay">
          ${formatPomoTime(pomoTimeLeft)}
        </div>
        <div style="margin-bottom:16px; display:flex; gap:6px; justify-content:center;">
          <span class="pill" id="pomoModeWork" style="background:${pomoMode==='work'?'var(--primary-dim)':'var(--bg-soft)'}; color:${pomoMode==='work'?'var(--primary)':'var(--text-muted)'}; font-weight:700;">تركيز</span>
          <span class="pill" id="pomoModeShort" style="background:${pomoMode==='short'?'var(--primary-dim)':'var(--bg-soft)'}; color:${pomoMode==='short'?'var(--primary)':'var(--text-muted)'}; font-weight:700;">راحة قصيرة</span>
        </div>
        <div style="display:flex; gap:8px; justify-content:center;">
          <button class="btn btn-primary" id="pomoStartBtn" onclick="togglePomoTimer()">${pomoTimerId?'إيقاف مؤقت':'▶️ ابدأ التركيز'}</button>
          <button class="btn" onclick="resetPomoTimer()">🔄 إعادة ضبط</button>
        </div>
      </div>

      <div class="card">
        <h3 class="section-title" style="display:flex; justify-content:space-between; align-items:center;">
          <span>🧠 مهام التركيز لليوم</span>
          <button class="btn" style="padding:4px 10px; font-size:12px;" onclick="openFocusTaskModal()">+ إضافة مهمة</button>
        </h3>
        <div id="focusTasksContainer">
          ${!list.length?`<div class="muted" style="font-size:13.5px; padding:20px 0; text-align:center;">لم تضف مهام تركيز لليوم بعد.</div>`:list.map(x=>`
            <div class="focus-task" style="background:var(--bg-elevated-2);">
              <input type="checkbox" ${x.done?'checked':''} style="width:20px; height:20px; cursor:pointer;" onchange="toggleFocusTaskDone('${x.id}')">
              <span style="flex:1; font-weight:600; font-size:14.5px; text-decoration:${x.done?'line-through':'none'}; opacity:${x.done?.5:1}">${esc(x.title)}</span>
              <div style="display:flex; align-items:center; gap:4px;">
                <button class="btn btn-ghost" style="padding:2px 6px; font-size:12px;" onclick="incrementPomoCount('${x.id}')">🍅 +1</button>
                <span class="pill" style="font-size:11px; font-weight:700;">${x.pomoCount || 0}</span>
                <button class="btn btn-icon btn-ghost" style="width:26px; height:26px; color:var(--danger); font-size:11px;" onclick="deleteFocusTask('${x.id}')">✕</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}
function formatPomoTime(sec){
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = (sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}
function togglePomoTimer(){
  if(pomoTimerId){
    clearInterval(pomoTimerId); pomoTimerId = null;
  }else{
    pomoTimerId = setInterval(()=>{
      pomoTimeLeft--;
      if(pomoTimeLeft <= 0){
        clearInterval(pomoTimerId); pomoTimerId = null;
        try { new Audio('https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg').play(); } catch(e){}
        if(pomoMode === 'work'){
          showToast('انتهت جلسة التركيز! خذ قسطاً من الراحة الآن','🍅');
          pomoMode = 'short'; pomoTimeLeft = 5 * 60;
        }else{
          showToast('انتهت الاستراحة، حان وقت العمل والتركيز!','🧠');
          pomoMode = 'work'; pomoTimeLeft = 25 * 60;
        }
      }
      const disp = $('#pomoDisplay'); if(disp) disp.textContent = formatPomoTime(pomoTimeLeft);
    }, 1000);
  }
  renderFocus();
}
function resetPomoTimer(){
  if(pomoTimerId) { clearInterval(pomoTimerId); pomoTimerId = null; }
  pomoMode = 'work'; pomoTimeLeft = 25 * 60;
  renderFocus();
}
function openFocusTaskModal(){
  openModal(`
    <div class="modal-head"><h3>إضافة مهمة تركيز</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="field"><label>ما هي المهمة التي تريد التركيز عليها الآن؟</label><input id="ftTitle" placeholder="مثال: مراجعة محاضرة علم النفس"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="saveFocusTask()">إضافة</button>
  `);
}
function saveFocusTask(){
  const title = $('#ftTitle').value.trim(); if(!title) return;
  const tk = todayKey(); if(!DB.focusTasks[tk]) DB.focusTasks[tk]=[];
  DB.focusTasks[tk].push({ id:uid(), title, done:false, pomoCount:0 });
  persist.focusTasks(); closeModal(); renderFocus(); showToast('تمت إضافة مهمة التركيز بنجاح','🧠');
}
function toggleFocusTaskDone(id){
  const tk = todayKey(); const list = DB.focusTasks[tk] || [];
  const x = list.find(t=>t.id===id); if(!x) return;
  x.done = !x.done; persist.focusTasks(); renderFocus();
}
function incrementPomoCount(id){
  const tk = todayKey(); const list = DB.focusTasks[tk] || [];
  const x = list.find(t=>t.id===id); if(!x) return;
  x.pomoCount = (x.pomoCount || 0) + 1; persist.focusTasks(); renderFocus(); showToast('كفو! تم تسجيل جلسة تركيز طماطم ناجحة','🍅');
}
function deleteFocusTask(id){
  const tk = todayKey(); if(!DB.focusTasks[tk]) return;
  DB.focusTasks[tk] = DB.focusTasks[tk].filter(t=>t.id!==id);
  persist.focusTasks(); renderFocus();
}

/* ====================== WALLET CENTER ====================== */
const WALLETS = [['instapay','InstaPay 📲'], ['cash','كاش / محفظة 💵']];
function renderWallet(){
  const w = $('#page-wallet');
  const total = Object.values(DB.wallet).reduce((a,b)=>a+b,0);

  w.innerHTML = `
    <div class="grid grid-3" style="margin-bottom:24px;">
      <div class="card" style="text-align:center;">
        <div class="muted" style="font-size:13px; font-weight:700;">إجمالي المحفظة المالي</div>
        <div style="font-size:28px; font-weight:900; color:var(--primary); margin:6px 0;">${total.toFixed(2)} <span style="font-size:15px;">ج.م</span></div>
      </div>
      ${WALLETS.map(([key,lbl])=>`
        <div class="card" style="display:flex; flex-direction:column; justify-content:space-between;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:700; font-size:14px;" class="muted">${lbl}</span>
            <button class="btn btn-ghost" style="padding:2px 6px; font-size:11px;" onclick="openEditBalanceModal('${key}')">✏️ تعديل</button>
          </div>
          <div style="font-size:20px; font-weight:800; margin-top:8px;">${(DB.wallet[key]||0).toFixed(2)} <span style="font-size:12px;">ج.م</span></div>
        </div>
      `).join('')}
    </div>

    <div class="card">
      <h3 class="section-title">📊 آخر المعاملات المالية</h3>
      ${!DB.transactions.length?`<div class="empty-state" style="padding:20px 0;"><p>لا توجد معاملات مسجلة بعد.</p></div>`:`
        <div style="overflow-x:auto;">
          <table style="width:100%; border-collapse:collapse; font-size:14px; text-align:start;">
            <thead>
              <tr style="border-bottom:1px solid var(--border); color:var(--text-muted); font-weight:700;">
                <th style="padding:10px 6px;">التاريخ</th>
                <th style="padding:10px 6px;">البيان</th>
                <th style="padding:10px 6px;">المحفظة</th>
                <th style="padding:10px 6px;">المبلغ</th>
                <th style="padding:10px 6px; width:40px;"></th>
              </tr>
            </thead>
            <tbody>
              ${DB.transactions.map(t=>`
                <tr style="border-bottom:1px solid var(--border-soft);">
                  <td style="padding:12px 6px;" class="muted">${esc(t.date)}</td>
                  <td style="padding:12px 6px; font-weight:600;">${esc(t.desc)}</td>
                  <td style="padding:12px 6px;"><span class="pill">${WALLETS.find(x=>x[0]===t.wallet)?.[1]||t.wallet}</span></td>
                  <td style="padding:12px 6px; font-weight:800; color:${t.type==='income'?'var(--success)':'var(--danger)'}">
                    ${t.type==='income'?'+':'-'}${t.amount.toFixed(2)}
                  </td>
                  <td style="padding:12px 6px;">
                    <button class="btn btn-icon btn-ghost" style="width:26px; height:26px; color:var(--danger);" onclick="deleteTransaction('${t.id}')">✕</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}
function openTransactionModal(){
  openModal(`
    <div class="modal-head"><h3>تسجيل معاملة مالية جديدة</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="field">
      <label>نوع المعاملة</label>
      <div class="seg-toggle">
        <input type="radio" name="txType" id="txTypeExpense" value="expense" checked>
        <label for="txTypeExpense">💸 مصروفات</label>
        <input type="radio" name="txType" id="txTypeIncome" value="income">
        <label for="txTypeIncome">💰 إيرادات / دخل</label>
      </div>
    </div>
    <div class="field">
      <label>المحفظة المستخدمة</label>
      <select id="txWallet">${WALLETS.map(([k,l])=>`<option value="${k}">${l}</option>`).join('')}</select>
    </div>
    <div class="field"><label>المبلغ (ج.م)</label><input id="txAmount" type="number" step="0.01" placeholder="0.00"></div>
    <div class="field"><label>البيان / الوصف</label><input id="txDesc" placeholder="مثال: شراء كورس أو غداء"></div>
    <button class="btn btn-primary" style="width:100%; margin-top:8px;" onclick="saveTransaction()">تسجيل المعاملة</button>
  `);
}
function saveTransaction(){
  const amount = parseFloat($('#txAmount').value);
  const desc = $('#txDesc').value.trim();
  const wallet = $('#txWallet').value;
  const type = $('input[name="txType"]:checked').value;

  if(isNaN(amount) || amount <= 0 || !desc) return;

  const t = { id: uid(), date: todayKey(), type, wallet, amount, desc };
  DB.transactions.unshift(t);

  // تحديث الحساب المالي تلقائياً
  DB.wallet[wallet] = (DB.wallet[wallet] || 0) + (type === 'income' ? amount : -amount);

  persist.transactions();
  persist.wallet();
  closeModal();
  renderWallet();
  showToast('تم تسجيل المعاملة وتحديث المحفظة بنجاح','💰');
}
function deleteTransaction(id){
  if(!confirm('هل تريد حذف هذه المعاملة؟')) return;
  const t = DB.transactions.find(x=>x.id===id); if(!t) return;
  DB.wallet[t.wallet] = (DB.wallet[t.wallet]||0) - (t.type==='income' ? t.amount : -t.amount);
  DB.transactions = DB.transactions.filter(x=>x.id!==id);
  persist.transactions(); persist.wallet(); renderWallet();
}
function openEditBalanceModal(key){
  const w = WALLETS.find(x=>x[0]===key);
  openModal(`
    <div class="modal-head"><h3>تعديل رصيد ${w[1]}</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div>
    <div class="field"><label>الرصيد الحالي (ج.م)</label><input id="editBalanceInput" type="number" step="0.01" value="${DB.wallet[key]||0}"></div>
    <button class="btn btn-primary" style="width:100%;" onclick="saveEditBalance('${key}')">حفظ</button>
  `);
}
function saveEditBalance(key){
  const val = Number($('#editBalanceInput').value);
  DB.wallet[key] = isNaN(val) ? 0 : val;
  persist.wallet(); closeModal(); renderWallet();
}

/* ====================== BOOT & SHORTCUTS ====================== */
async function boot(){
  await loadAll();
  applyTheme();
  renderShell();
  renderApp();
  
  // نظام ميزة الاختصارات الذكية Keyboard Shortcuts (Ctrl + S للحفظ الفوري)
  window.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      
      // حفظ البيانات الحالية المفتوحة في المودال أو العناصر المفعلة بشكل ذكي وفوري
      const journalTextarea = $('#jContent');
      const quranNotesTextarea = $('#qNotes');
      
      if (journalTextarea) {
        saveJournal();
      } else if (quranNotesTextarea) {
        saveQuranProgress();
      } else {
        // إذا لم يكن هناك حقل نصي مفتوح، يطلق حفظاً عاماً لجميع بيانات الـ Cache
        Promise.all(Object.values(persist).map(fn=>fn())).then(() => {
          showToast('تمت مزامنة وحفظ كل البيانات محلياً وبنجاح!', '💾');
        });
      }
    }
  });
}

// تشغيل نظام حياتك عند تحميل الصفحة
document.addEventListener('DOMContentLoaded', boot);

// تسجيل الـ Service Worker للتشغيل أوفلاين
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(reg => console.log('Service Worker Registered!', reg))
      .catch(err => console.log('Service Worker Failed!', err));
  });
}
</script>
