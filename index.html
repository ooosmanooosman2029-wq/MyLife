<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MY LIFE OS — نظام تشغيل حياتك</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F6F54">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--radius-s:10px;--radius-m:16px;--radius-l:24px;--radius-xl:32px;--shadow-s:0 1px 3px rgba(20,30,25,.06),0 1px 2px rgba(20,30,25,.08);--shadow-m:0 8px 24px rgba(20,30,25,.10),0 2px 6px rgba(20,30,25,.07);--shadow-l:0 20px 50px rgba(20,30,25,.18);--ease:cubic-bezier(.22,1,.36,1);}
html[data-theme="light"]{--bg:#FBF8F2;--bg-soft:#F3EEE2;--bg-elevated:#FFFFFF;--bg-elevated-2:#FFFEFB;--text:#1C2622;--text-muted:#6E7A72;--text-faint:#A4ADA4;--border:#E9E2D2;--border-soft:#F0EBDD;--primary:#1F6F54;--primary-light:#2FA876;--primary-dim:#E5F1EB;--accent:#B6862F;--accent-soft:#F4E9D2;--success:#2FA876;--success-soft:#E1F4EB;--danger:#C4543F;--danger-soft:#F8E5E0;--warning:#D4820A;--warning-soft:#FEF3DC;--gold-glow:radial-gradient(circle,rgba(201,162,75,.35),transparent 70%);}
html[data-theme="dark"]{--bg:#121212;--bg-soft:#1A1A1A;--bg-elevated:#1E1E1E;--bg-elevated-2:#222222;--text:#EAEAEA;--text-muted:#A0A0A0;--text-faint:#5A5A5A;--border:#2A2A2A;--border-soft:#242424;--primary:#36B888;--primary-light:#4ED7A3;--primary-dim:#0D2420;--accent:#D8B662;--accent-soft:#221C0D;--success:#3FCB91;--success-soft:#0A1F1A;--danger:#E58572;--danger-soft:#231010;--warning:#F0B84A;--warning-soft:#1E1608;--gold-glow:radial-gradient(circle,rgba(216,182,98,.18),transparent 70%);}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;-webkit-font-smoothing:antialiased;transition:background .3s var(--ease),color .3s var(--ease);min-height:100vh;overflow-x:hidden;}
.font-amiri{font-family:'Amiri',serif;}::selection{background:var(--primary);color:#fff;}
::-webkit-scrollbar{width:6px;height:6px;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px;}::-webkit-scrollbar-track{background:transparent;}
a{color:inherit;text-decoration:none;}button{font-family:inherit;cursor:pointer;}:focus-visible{outline:2px solid var(--primary);outline-offset:2px;}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
.app-shell{display:flex;min-height:100vh;position:relative;}
.sidebar{position:fixed;inset-inline-start:0;top:0;bottom:0;width:280px;z-index:60;background:var(--bg-elevated);border-inline-end:1px solid var(--border);transform:translateX(110%);transition:transform .4s var(--ease);display:flex;flex-direction:column;padding:20px 16px;}
.sidebar.open{transform:translateX(0);}
.sidebar-overlay{position:fixed;inset:0;background:rgba(10,14,12,.45);backdrop-filter:blur(2px);z-index:55;opacity:0;pointer-events:none;transition:opacity .35s var(--ease);}
.sidebar-overlay.show{opacity:1;pointer-events:auto;}
.nav-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:var(--radius-s);color:var(--text-muted);font-weight:500;font-size:14.5px;transition:all .2s var(--ease);margin-bottom:2px;cursor:pointer;}
.nav-item:hover{background:var(--bg-soft);color:var(--text);}
.nav-item.active{background:var(--primary-dim);color:var(--primary);}
html[data-theme="dark"] .nav-item.active{color:var(--primary-light);}
.nav-item .ic{width:20px;text-align:center;font-size:16px;}
.nav-section-label{font-size:10px;font-weight:800;letter-spacing:.8px;color:var(--text-faint);padding:10px 14px 3px;text-transform:uppercase;}
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:color-mix(in srgb,var(--bg) 85%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-soft);}
.hamburger{width:42px;height:42px;border-radius:12px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s var(--ease);}
.hamburger:hover{background:var(--bg-soft);}
.logo-wrap{display:flex;align-items:center;gap:10px;}
.logo-mark{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:12px;box-shadow:var(--shadow-s);}
.logo-text{font-weight:900;font-size:15px;letter-spacing:.3px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.icon-btn{width:40px;height:40px;border-radius:11px;background:var(--bg-elevated);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .2s var(--ease);}
.icon-btn:hover{background:var(--bg-soft);}
.main{flex:1;max-width:1200px;margin:0 auto;width:100%;padding:0 18px 90px;}
.page{display:none;animation:fadeUp .4s var(--ease);}.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.card{background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:var(--radius-m);box-shadow:var(--shadow-s);padding:18px;transition:transform .25s var(--ease),box-shadow .25s var(--ease);}
.card-hover:hover{box-shadow:var(--shadow-m);transform:translateY(-2px);}
.section-title{font-weight:800;font-size:17px;margin:0 0 14px;}
.muted{color:var(--text-muted);}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:99px;font-size:12px;font-weight:700;background:var(--bg-soft);color:var(--text-muted);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 18px;border-radius:var(--radius-s);border:1px solid var(--border);background:var(--bg-elevated);color:var(--text);font-weight:700;font-size:14px;transition:all .2s var(--ease);}
.btn:hover{background:var(--bg-soft);transform:translateY(-1px);}
.btn-primary{background:var(--primary)!important;border-color:var(--primary)!important;color:#fff!important;}
.btn-primary:hover{background:var(--primary-light)!important;border-color:var(--primary-light)!important;}
.btn-ghost{border-color:transparent;background:transparent;}.btn-ghost:hover{background:var(--bg-soft);}
.btn-danger{background:var(--danger)!important;border-color:var(--danger)!important;color:#fff!important;}
.btn-icon{width:38px;height:38px;padding:0;border-radius:10px;}.btn-sm{padding:7px 13px;font-size:13px;}
input,textarea,select{width:100%;padding:11px 13px;border-radius:var(--radius-s);border:1px solid var(--border);background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;transition:all .2s var(--ease);}
input:focus,textarea:focus,select:focus{border-color:var(--primary);background:var(--bg-elevated);outline:none;}
label{font-size:12.5px;font-weight:700;color:var(--text-muted);margin-bottom:5px;display:block;}
.field{margin-bottom:14px;}
.habit-row{display:flex;align-items:center;gap:14px;padding:13px 14px;border-radius:var(--radius-s);border:1px solid var(--border-soft);margin-bottom:8px;background:var(--bg-elevated-2);transition:all .25s var(--ease);cursor:pointer;position:relative;overflow:hidden;}
.habit-row:hover{border-color:var(--primary);}
.habit-row.done{background:var(--success-soft);border-color:var(--success);}
.chk{width:24px;height:24px;border-radius:8px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .25s var(--ease);background:var(--bg-elevated);}
.habit-row.done .chk{background:var(--success);border-color:var(--success);color:#fff;}
.habit-row .hl{font-weight:600;font-size:15px;flex:1;}
.habit-row.done .hl{color:var(--success);text-decoration:line-through;opacity:.75;}
@keyframes pop{0%{transform:scale(1);}40%{transform:scale(1.15);}100%{transform:scale(1);}}.pop{animation:pop .3s var(--ease);}
.ring-wrap{position:relative;width:155px;height:155px;margin:0 auto;}
.ring-wrap svg{transform:rotate(-90deg);width:100%;height:100%;}
.ring-bg{fill:none;stroke:var(--border-soft);stroke-width:10;}
.ring-fg{fill:none;stroke:url(#ringGrad);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .8s var(--ease);}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-pct{font-size:28px;font-weight:900;}.ring-label{font-size:11px;color:var(--text-muted);font-weight:600;}
.bar-track{height:8px;border-radius:99px;background:var(--bg-soft);overflow:hidden;}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--primary),var(--primary-light));transition:width .7s var(--ease);}
.bar-fill.gold{background:linear-gradient(90deg,var(--accent),#E8C46A);}.bar-fill.danger{background:linear-gradient(90deg,var(--danger),#E87B6A);}
.grid{display:grid;gap:14px;}.grid-2{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(3,1fr);}.grid-4{grid-template-columns:repeat(4,1fr);}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr);}}@media(max-width:760px){.grid-3,.grid-4{grid-template-columns:repeat(2,1fr);}}@media(max-width:520px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:var(--bg-elevated);border:1px solid var(--primary);color:var(--primary);font-weight:700;padding:12px 22px;border-radius:99px;box-shadow:var(--shadow-l);opacity:0;transition:all .4s var(--ease);display:flex;align-items:center;gap:8px;max-width:90vw;text-align:center;pointer-events:none;}
html[data-theme="dark"] .toast{color:var(--primary-light);}.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.celebrate-overlay{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;background:rgba(10,16,13,.75);backdrop-filter:blur(6px);}
.celebrate-overlay.show{display:flex;}
.celebrate-card{position:relative;background:var(--bg-elevated);border-radius:var(--radius-xl);padding:42px 30px;text-align:center;max-width:380px;width:90%;box-shadow:var(--shadow-l);overflow:hidden;animation:celebIn .5s var(--ease);}
@keyframes celebIn{from{opacity:0;transform:scale(.85) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.celebrate-glow{position:absolute;inset:-40%;background:var(--gold-glow);pointer-events:none;}
.celebrate-badge{width:84px;height:84px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,var(--accent),var(--primary));box-shadow:0 0 0 8px var(--accent-soft);animation:badgePulse 1.8s ease-in-out infinite;}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 8px var(--accent-soft);}50%{box-shadow:0 0 0 14px transparent;}}
.confetti-piece{position:absolute;top:-10px;border-radius:2px;opacity:.9;animation:confettiFall linear forwards;}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(540deg);opacity:0;}}
.badge-tile{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:18px 12px;border-radius:var(--radius-m);border:1px solid var(--border-soft);background:var(--bg-elevated-2);}
.badge-tile.locked{opacity:.3;filter:grayscale(1);}
.modal-overlay{position:fixed;inset:0;background:rgba(10,16,13,.55);backdrop-filter:blur(4px);z-index:250;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}@media(min-width:640px){.modal-overlay{align-items:center;}}
.modal{background:var(--bg-elevated);width:100%;max-width:500px;border-radius:var(--radius-l) var(--radius-l) 0 0;padding:24px;max-height:90vh;overflow-y:auto;animation:modalUp .35s var(--ease);}
@media(min-width:640px){.modal{border-radius:var(--radius-l);}}
@keyframes modalUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}.modal-head h3{margin:0;font-size:18px;font-weight:800;}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}.empty-state .eic{font-size:42px;margin-bottom:10px;opacity:.6;}
.seg-toggle{display:flex;gap:8px;}.seg-toggle input{position:absolute;opacity:0;width:0;height:0;pointer-events:none;}
.seg-toggle label{flex:1;text-align:center;padding:10px 14px;border-radius:99px;border:1px solid var(--border);font-weight:700;font-size:14px;color:var(--text-muted);background:var(--bg-elevated);cursor:pointer;transition:all .2s var(--ease);user-select:none;}
.seg-toggle input:checked+label{background:var(--primary);border-color:var(--primary);color:#fff;}
.star-row{display:flex;gap:4px;font-size:22px;}.star{color:var(--border);cursor:pointer;transition:color .15s;}.star.on{color:var(--accent);}
.fab{position:fixed;bottom:24px;inset-inline-end:24px;z-index:30;width:58px;height:58px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(31,111,84,.4);transition:all .25s var(--ease);border:none;}
.fab:hover{transform:scale(1.08);}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:110px;}
.chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.chart-fill{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--primary-light),var(--primary));transition:height .6s var(--ease);min-height:3px;}
.chart-lbl{font-size:10.5px;color:var(--text-muted);font-weight:600;}
.tab-row{display:flex;gap:8px;margin-bottom:18px;overflow-x:auto;padding-bottom:3px;}
.tab-btn{padding:8px 16px;border-radius:99px;border:1px solid var(--border);font-weight:700;font-size:13px;white-space:nowrap;color:var(--text-muted);background:var(--bg-elevated);cursor:pointer;transition:all .2s var(--ease);}
.tab-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}
.stat-card{background:var(--bg-elevated);border:1px solid var(--border-soft);border-radius:var(--radius-m);padding:16px;display:flex;flex-direction:column;gap:4px;}
.stat-val{font-size:26px;font-weight:900;}.stat-lbl{font-size:12px;color:var(--text-muted);font-weight:700;}
.hero-greeting{background:linear-gradient(145deg,var(--primary-dim),var(--bg-elevated) 60%);border:1px solid var(--border-soft);border-radius:var(--radius-l);padding:24px 24px 80px;position:relative;overflow:hidden;margin-bottom:18px;}
.hero-greeting::after{content:"";position:absolute;inset-inline-end:-60px;top:-60px;width:200px;height:200px;border-radius:50%;background:var(--gold-glow);}
.hero-text{position:relative;z-index:2;}
.mosque-deco{position:absolute;inset-inline-start:0;inset-inline-end:0;bottom:0;width:100%;height:70px;z-index:1;opacity:.35;pointer-events:none;}
.heatmap-grid{display:flex;flex-wrap:wrap;gap:3px;}
.hm-day{width:14px;height:14px;border-radius:3px;cursor:pointer;transition:transform .15s;border:1px solid rgba(0,0,0,.06);}
.hm-day:hover{transform:scale(1.3);}
.hm-0{background:var(--bg-soft);}.hm-1{background:#c6e6d4;}.hm-2{background:#74c89a;}.hm-3{background:#2FA876;}.hm-4{background:#1F6F54;}
html[data-theme="dark"] .hm-1{background:#1a3d2c;}html[data-theme="dark"] .hm-2{background:#1e5c3d;}html[data-theme="dark"] .hm-3{background:#27804e;}html[data-theme="dark"] .hm-4{background:#36B888;}
.emergency-overlay{position:fixed;inset:0;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:30px;}
.emergency-overlay.show{display:flex;}
.emergency-card{background:var(--bg-elevated);border:2px solid var(--primary);border-radius:var(--radius-xl);padding:30px 24px;max-width:420px;width:100%;text-align:center;box-shadow:var(--shadow-l);}
.emergency-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius-m);background:var(--primary-dim);border:1px solid var(--primary);margin-bottom:12px;text-align:start;}
.life-status-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 18px;border-radius:99px;font-weight:800;font-size:15px;border:2px solid;}
.status-green{background:var(--success-soft);border-color:var(--success);color:var(--success);}
.status-yellow{background:var(--warning-soft);border-color:var(--warning);color:var(--warning);}
.status-red{background:var(--danger-soft);border-color:var(--danger);color:var(--danger);}
.now-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:var(--radius-s);border:1px solid var(--border-soft);background:var(--bg-elevated-2);margin-bottom:10px;}
.now-item .now-icon{font-size:20px;width:32px;text-align:center;}.now-item .now-label{font-size:12px;color:var(--text-muted);font-weight:600;}.now-item .now-val{font-size:15px;font-weight:700;}
.water-btn{flex:1;padding:12px 8px;border-radius:var(--radius-s);border:1px solid var(--primary);background:var(--primary-dim);color:var(--primary);font-weight:800;font-size:14px;text-align:center;cursor:pointer;transition:all .2s var(--ease);}
html[data-theme="dark"] .water-btn{color:var(--primary-light);}.water-btn:hover{background:var(--primary);color:#fff;}
.vitamin-check{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-s);border:1px solid var(--border-soft);background:var(--bg-elevated-2);margin-bottom:8px;cursor:pointer;transition:all .2s var(--ease);}
.vitamin-check.taken{background:var(--success-soft);border-color:var(--success);}
.mood-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 10px;border-radius:var(--radius-m);border:2px solid var(--border);background:var(--bg-elevated-2);cursor:pointer;transition:all .2s var(--ease);font-size:13px;font-weight:700;}
.mood-btn:hover{border-color:var(--primary);transform:scale(1.05);}
.mood-btn.selected{border-color:var(--primary);background:var(--primary-dim);color:var(--primary);}
html[data-theme="dark"] .mood-btn.selected{color:var(--primary-light);}.mood-emoji{font-size:28px;}
.what-now-btn{width:100%;padding:20px;border-radius:var(--radius-l);background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;font-size:18px;font-weight:900;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(31,111,84,.35);transition:all .3s var(--ease);display:flex;align-items:center;justify-content:center;gap:12px;}
.what-now-btn:hover{transform:translateY(-3px);box-shadow:0 14px 32px rgba(31,111,84,.45);}
.suggestion-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:var(--radius-m);border:2px solid var(--primary);background:var(--primary-dim);margin-bottom:10px;}
html[data-theme="dark"] .suggestion-item{border-color:var(--primary-light);}
.focus-task-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:var(--radius-s);border:1px solid var(--border-soft);background:var(--bg-elevated-2);margin-bottom:8px;}
.pomo-display{font-size:56px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:1px;margin:12px 0;}
</style>

<body>
<div id="app" class="app-shell"></div>
<div id="toast" class="toast"></div>
<div id="celebrateOverlay" class="celebrate-overlay"></div>
<div id="modalOverlay" class="modal-overlay"></div>
<div id="emergencyOverlay" class="emergency-overlay"></div>
<script>
const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>[...r.querySelectorAll(s)];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayKey=(d=new Date())=>d.toISOString().slice(0,10);
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const esc=(s='')=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const GREG_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const WEEKDAYS_AR=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const HIJRI_MONTHS=['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
function hijriDate(date=new Date()){try{const f=new Intl.DateTimeFormat('en-TN-u-ca-islamic',{day:'numeric',month:'numeric',year:'numeric'});const p=f.formatToParts(date).reduce((a,x)=>(a[x.type]=x.value,a),{});return `${p.day} ${HIJRI_MONTHS[parseInt(p.month,10)-1]||''} ${p.year}هـ`;}catch(e){return '';}}
function gregorianStr(date=new Date()){return `${WEEKDAYS_AR[date.getDay()]}، ${date.getDate()} ${GREG_MONTHS[date.getMonth()]} ${date.getFullYear()}`;}

function dayCompletionPct(day){const done=HOME_PCT_KEYS.filter(k=>day[k]).length;return Math.round((done/HOME_PCT_KEYS.length)*100);}
function allObligatoryDone(day){return OBLIGATORY.every(k=>day[k]);}
function computeStreak(){let s=0,d=new Date();while(true){const day=DB.prayerHistory[todayKey(d)];if(day&&allObligatoryDone(day)){s++;d.setDate(d.getDate()-1);}else break;}return s;}
function computeLongestStreak(){const dates=Object.keys(DB.prayerHistory).filter(k=>allObligatoryDone(DB.prayerHistory[k])).sort();let longest=0,cur=0,prev=null;for(const ds of dates){const d=new Date(ds);if(prev&&(d-prev)/86400000===1)cur++;else cur=1;longest=Math.max(longest,cur);prev=d;}return longest;}
function totalCompletedDays(){return Object.values(DB.prayerHistory).filter(allObligatoryDone).length;}
function last7DaysPct(){const out=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const day=DB.prayerHistory[todayKey(d)]||emptyDay();out.push({label:WEEKDAYS_AR[d.getDay()].slice(0,3),pct:dayCompletionPct(day)});}return out;}
function computeDayScore(dateKey){const day=DB.prayerHistory[dateKey]||emptyDay();let s=dayCompletionPct(day)*.5;if(DB.quranProgress.updatedAt&&DB.quranProgress.updatedAt.startsWith(dateKey))s+=20;if(DB.courses.some(c=>c.updatedAt&&c.updatedAt.startsWith(dateKey)))s+=20;if(DB.goals2026.some(g=>g.done&&g.doneAt&&g.doneAt.startsWith(dateKey)))s+=10;return Math.min(100,s);}

function checkAchievements(){
  const streak=computeStreak();const totalDays=totalCompletedDays();

  const hasWater=Object.keys(DB.health.water||{}).length>0;
  const hasWorkout=(DB.health.workoutLog||[]).length>0;
  const conds={first_step:totalDays>=1,streak_3:streak>=3,streak_7:streak>=7,streak_30:streak>=30,quran_start:!!DB.quranProgress.surah||surahCount>0,quran_10:surahCount>=10,book_one:DB.books.length>0,lesson_one:DB.lessons.length>0,goal_done:DB.goals2026.some(g=>g.done),xp_1000:(DB.analytics.xp||0)>=1000,health_water:hasWater,workout_first:hasWorkout};
  Object.entries(conds).forEach(([id,met])=>{if(met&&!DB.achievementsSeen.includes(id)){DB.achievementsSeen.push(id);persist.achievementsSeen();const b=BADGES.find(x=>x.id===id);if(b){setTimeout(()=>showToast(`إنجاز جديد: ${b.title} 🏆`,b.ic),1200);if(b.xp)addXP(b.xp);}}});

function renderHeatmap(){

  const now=new Date();const year=now.getFullYear();

  let days=[];for(let i=0;i<365+(new Date(year,1,29).getMonth()===1?1:0);i++){const d=new Date(year,0,1+i);if(d.getFullYear()===year)days.push(todayKey(d));}

    </div>
    <div class="card" style="margin-bottom:20px;">

      <div style="display:flex;align-items:center;gap:8px;margin-top:12px;font-size:12px;" class="muted">
        <span>أقل</span><div style="width:14px;height:14px;border-radius:3px;background:var(--bg-soft);border:1px solid var(--border);"></div><div style="width:14px;height:14px;border-radius:3px;background:#c6e6d4;"></div><div style="width:14px;height:14px;border-radius:3px;background:#74c89a;"></div><div style="width:14px;height:14px;border-radius:3px;background:#2FA876;"></div><div style="width:14px;height:14px;border-radius:3px;background:#1F6F54;"></div><span>أكثر</span>
      </div>
    </div>
    <div id="heatmapDayDetail"></div>`;
  const grid=$('#heatmapGrid');
  for(let i=0;i<startDay;i++)grid.insertAdjacentHTML('beforeend','<div style="width:14px;height:14px;"></div>');
  days.forEach(dk=>{

  });
}

      <div class="card"><h3 class="section-title">🎓 الكورسات</h3><div style="font-size:13.5px;display:flex;flex-direction:column;gap:6px;"><div class="muted">إجمالي: <strong>${DB.courses.length}</strong></div><div class="muted">ساعات مكتملة: <strong>${DB.courses.reduce((a,c)=>a+(c.completedHours||0),0).toFixed(0)}</strong></div><div class="muted">المعدل: <strong>${DB.courses.length?Math.round(DB.courses.reduce((a,c)=>a+((c.completedHours||0)/(c.totalHours||1)),0)/DB.courses.length*100):0}%</strong></div></div></div>
      <div class="card"><h3 class="section-title">📖 القرآن</h3><div style="font-size:13.5px;display:flex;flex-direction:column;gap:6px;"><div class="muted">سور محفوظة: <strong>${Object.values(DB.quranProgress.surahs||{}).filter(s=>s.memorized).length}</strong></div><div class="muted">سور مراجعة: <strong>${Object.values(DB.quranProgress.surahs||{}).filter(s=>s.reviewed).length}</strong></div></div></div>
      <div class="card"><h3 class="section-title">🎯 الأهداف</h3><div style="font-size:13.5px;display:flex;flex-direction:column;gap:6px;"><div class="muted">إجمالي: <strong>${DB.goals2026.length}</strong></div><div class="muted">مكتمل: <strong>${DB.goals2026.filter(g=>g.done).length}</strong></div><div class="muted">نسبة: <strong>${DB.goals2026.length?Math.round(DB.goals2026.filter(g=>g.done).length/DB.goals2026.length*100):0}%</strong></div></div></div>
    </div>`;
}
/* HEALTH HUB */
function renderHealth(){
  const h=$('#page-health');const tab=HEALTH_TAB;
  h.innerHTML=`<div class="tab-row"><button class="tab-btn ${tab==='water'?'active':''}" onclick="HEALTH_TAB='water';renderHealth()">💧 الماء</button><button class="tab-btn ${tab==='vitamins'?'active':''}" onclick="HEALTH_TAB='vitamins';renderHealth()">💊 الفيتامينات</button><button class="tab-btn ${tab==='nutrition'?'active':''}" onclick="HEALTH_TAB='nutrition';renderHealth()">🥗 التغذية</button><button class="tab-btn ${tab==='workout'?'active':''}" onclick="HEALTH_TAB='workout';renderHealth()">🏋️ الجيم</button><button class="tab-btn ${tab==='body'?'active':''}" onclick="HEALTH_TAB='body';renderHealth()">📏 القياسات</button></div><div id="healthTabContent"></div>`;
  const c=$('#healthTabContent');
  if(tab==='water')renderWaterTab(c);
  else if(tab==='vitamins')renderVitaminsTab(c);
  else if(tab==='nutrition')renderNutritionTab(c);
  else if(tab==='workout')renderWorkoutTab(c);
  else if(tab==='body')renderBodyTab(c);
}
function renderWaterTab(c){
  const tk=todayKey();const today=(DB.health.water||{})[tk]||0;const goal=2000;const pct=Math.round(Math.min(today/goal,1)*100);
  c.innerHTML=`<div class="card" style="text-align:center;margin-bottom:16px;"><div style="font-size:42px;margin-bottom:4px;">💧</div><div style="font-size:36px;font-weight:900;color:#2563eb;">${today}<span style="font-size:16px;"> مل</span></div><div class="muted" style="font-size:13px;margin:6px 0;">من ${goal} مل (${pct}%)</div><div class="bar-track" style="margin:12px 0;height:14px;border-radius:99px;"><div style="height:100%;border-radius:99px;background:linear-gradient(90deg,#60a5fa,#2563eb);width:${pct}%;transition:width .7s var(--ease);"></div></div>${pct>=100?'<div style="color:var(--success);font-weight:800;">🎉 وصلت لهدفك اليومي!</div>':pct>=60?'<div style="color:var(--warning);font-weight:700;">💪 أنت في المنتصف، استمر</div>':'<div class="muted">اشرب الماء، جسمك يحتاجه</div>'}</div><div style="display:flex;gap:10px;margin-bottom:16px;"><button class="water-btn" onclick="addWater(250)">+250 مل</button><button class="water-btn" onclick="addWater(500)">+500 مل</button><button class="water-btn" onclick="addWater(1000)">+1 لتر</button></div><button class="btn btn-ghost" onclick="resetWaterToday()" style="font-size:13px;">🔄 إعادة ضبط اليوم</button>`;
}
function addWater(ml){if(!DB.health.water)DB.health.water={};const tk=todayKey();DB.health.water[tk]=(DB.health.water[tk]||0)+ml;persist.health();renderHealth();showToast(`+${ml} مل ماء 💧`,'💧');checkAchievements();}
function renderVitaminsTab(c){
  if(!DB.health.vitamins)DB.health.vitamins=[];if(!DB.health.vitaminLog)DB.health.vitaminLog={};
  const tk=todayKey();const log=(DB.health.vitaminLog[tk])||{};
  const takenCount=DB.health.vitamins.filter(v=>log[v.id]).length;const total=DB.health.vitamins.length;
  c.innerHTML=`<div class="card" style="margin-bottom:16px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3 class="section-title" style="margin:0;">💊 فيتامينات اليوم</h3><div style="font-weight:800;color:var(--primary);">${takenCount}/${total}</div></div><div class="bar-track" style="margin-bottom:14px;"><div class="bar-fill" style="width:${total?Math.round(takenCount/total*100):0}%"></div></div>${!DB.health.vitamins.length?`<div class="empty-state" style="padding:20px 0;"><p>أضف فيتاميناتك أولاً.</p></div>`:DB.health.vitamins.map(v=>`<div class="vitamin-check ${log[v.id]?'taken':''}" onclick="toggleVitamin('${v.id}')"><div class="chk">${log[v.id]?'✓':''}</div><div style="flex:1;"><div style="font-weight:700;font-size:14px;">${esc(v.name)}</div><div class="muted" style="font-size:12px;">${esc(v.dose||'')} — ${esc(v.freq||'')}</div></div>${log[v.id]?'<span style="color:var(--success);font-size:18px;">✅</span>':''}</div>`).join('')}<button class="btn btn-sm" style="margin-top:10px;" onclick="openAddVitaminModal()">+ إضافة فيتامين</button></div>`;
}
function toggleVitamin(id){if(!DB.health.vitaminLog)DB.health.vitaminLog={};const tk=todayKey();if(!DB.health.vitaminLog[tk])DB.health.vitaminLog[tk]={};DB.health.vitaminLog[tk][id]=!DB.health.vitaminLog[tk][id];persist.health();renderHealth();if(DB.health.vitaminLog[tk][id])showToast('تم تناول الفيتامين ✅','💊');}
function openAddVitaminModal(){openModal(`<div class="modal-head"><h3>💊 إضافة فيتامين</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div><div class="field"><label>اسم الفيتامين</label><input id="vName" placeholder="مثال: Vitamin D3"></div><div class="field"><label>الجرعة</label><input id="vDose" placeholder="مثال: 5000 IU"></div><div class="field"><label>التكرار</label><select id="vFreq"><option>يومياً</option><option>مرتين يومياً</option><option>أسبوعياً</option></select></div><button class="btn btn-primary" style="width:100%;" onclick="saveVitamin()">إضافة</button>`);}
function saveVitamin(){const name=$('#vName').value.trim();if(!name)return;if(!DB.health.vitamins)DB.health.vitamins=[];DB.health.vitamins.push({id:uid(),name,dose:$('#vDose').value.trim(),freq:$('#vFreq').value});persist.health();closeModal();renderHealth();showToast('تمت إضافة الفيتامين','💊');}
function renderNutritionTab(c){
  const tk=todayKey();const todayMeals=(DB.health.meals||[]).filter(m=>m.date===tk);
  const totalCals=todayMeals.reduce((a,m)=>a+(m.calories||0),0);
  c.innerHTML=`<div class="card" style="margin-bottom:16px;text-align:center;"><div style="font-size:32px;font-weight:900;color:var(--primary);">${totalCals}<span style="font-size:15px;"> سعرة</span></div><div class="muted" style="font-size:13px;">السعرات اليوم</div></div><div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px;">${todayMeals.map(m=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;"><div><div style="font-weight:700;">${esc(m.name)}</div><div class="muted" style="font-size:12px;">${esc(m.time||'')}${m.notes?' — '+esc(m.notes):''}</div></div><div style="display:flex;align-items:center;gap:10px;"><span style="font-weight:800;color:var(--primary);">${m.calories||0} cal</span><button class="btn btn-icon btn-ghost" style="width:26px;height:26px;color:var(--danger);font-size:11px;" onclick="deleteMeal('${m.id}')">✕</button></div></div>`).join('')}</div><button class="btn btn-primary" style="width:100%;" onclick="openAddMealModal()">+ إضافة وجبة</button>`;
}
function openAddMealModal(){openModal(`<div class="modal-head"><h3>🥗 إضافة وجبة</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div><div class="field"><label>اسم الوجبة</label><input id="mName" placeholder="مثال: الإفطار"></div><div class="grid grid-2"><div class="field"><label>الوقت</label><input id="mTime" type="time"></div><div class="field"><label>السعرات</label><input id="mCals" type="number" placeholder="0"></div></div><div class="field"><label>ملاحظات</label><input id="mNotes" placeholder="اختياري"></div><button class="btn btn-primary" style="width:100%;" onclick="saveMeal()">إضافة</button>`);}
function saveMeal(){const name=$('#mName').value.trim();if(!name)return;if(!DB.health.meals)DB.health.meals=[];DB.health.meals.push({id:uid(),name,date:todayKey(),time:$('#mTime').value,calories:parseInt($('#mCals').value)||0,notes:$('#mNotes').value.trim()});persist.health();closeModal();renderHealth();showToast('تمت إضافة الوجبة','🥗');}
function deleteMeal(id){DB.health.meals=(DB.health.meals||[]).filter(m=>m.id!==id);persist.health();renderHealth();}
function renderWorkoutTab(c){
  const tk=todayKey();const todayLog=(DB.health.workoutLog||[]).filter(w=>w.date===tk);
  c.innerHTML=`<div class="card" style="margin-bottom:16px;"><h3 class="section-title">🏋️ تمرين اليوم</h3>${!todayLog.length?`<div class="muted" style="font-size:13.5px;padding:14px 0;text-align:center;">لم تسجل تمريناً اليوم.</div>`:todayLog.map(w=>`<div style="padding:12px;border-radius:var(--radius-s);background:var(--primary-dim);margin-bottom:8px;"><div style="font-weight:800;font-size:14px;color:var(--primary);">${esc(w.planName)}</div>${w.notes?`<div class="muted" style="font-size:12.5px;">${esc(w.notes)}</div>`:''}</div>`).join('')}<button class="btn btn-primary" style="width:100%;margin-top:12px;" onclick="openLogWorkoutModal()">+ تسجيل تمرين</button></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><h3 class="section-title" style="margin:0;">📋 خطط التمرين</h3><button class="btn btn-sm" onclick="openAddWorkoutPlanModal()">+ خطة جديدة</button></div>${!(DB.health.workoutPlans||[]).length?`<div class="muted" style="font-size:13.5px;">لا توجد خطط بعد.</div>`:DB.health.workoutPlans.map(p=>`<div style="padding:14px;border:1px solid var(--border-soft);border-radius:var(--radius-s);margin-bottom:8px;"><div style="font-weight:800;font-size:15px;">${esc(p.name)}</div><div class="muted" style="font-size:12.5px;margin-top:4px;">${(p.exercises||[]).length} تمرين</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">${(p.exercises||[]).map(e=>`<span class="pill" style="font-size:10.5px;">${esc(e.name)} ${e.sets||0}×${e.reps||0}</span>`).join('')}</div></div>`).join('')}</div>`;
}
function openAddWorkoutPlanModal(){openModal(`<div class="modal-head"><h3>🏋️ خطة تمرين جديدة</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div><div class="field"><label>اسم الخطة</label><input id="wpName" placeholder="مثال: Push Day"></div><div id="exInputs"><div style="display:flex;gap:6px;margin-bottom:6px;"><input placeholder="اسم التمرين" style="flex:2;" class="ex-name"><input type="number" placeholder="Sets" style="flex:1;" class="ex-sets"><input type="number" placeholder="Reps" style="flex:1;" class="ex-reps"></div></div><button class="btn btn-ghost btn-sm" onclick="addExRow()" style="margin-bottom:14px;">+ تمرين آخر</button><button class="btn btn-primary" style="width:100%;" onclick="saveWorkoutPlan()">حفظ الخطة</button>`);}
function addExRow(){const c=$('#exInputs');if(!c)return;c.insertAdjacentHTML('beforeend','<div style="display:flex;gap:6px;margin-bottom:6px;"><input placeholder="اسم التمرين" style="flex:2;" class="ex-name"><input type="number" placeholder="Sets" style="flex:1;" class="ex-sets"><input type="number" placeholder="Reps" style="flex:1;" class="ex-reps"></div>');}
function saveWorkoutPlan(){const name=$('#wpName').value.trim();if(!name)return;const exercises=[];$$('.ex-name').forEach((el,i)=>{const n=el.value.trim();if(n)exercises.push({name:n,sets:parseInt($$('.ex-sets')[i]?.value)||0,reps:parseInt($$('.ex-reps')[i]?.value)||0});});if(!DB.health.workoutPlans)DB.health.workoutPlans=[];DB.health.workoutPlans.push({id:uid(),name,exercises});persist.health();closeModal();renderHealth();showToast('تم حفظ خطة التمرين','🏋️');}
function openLogWorkoutModal(){const plans=DB.health.workoutPlans||[];if(!plans.length){showToast('أضف خطة تمرين أولاً','⚠️');return;}openModal(`<div class="modal-head"><h3>📝 تسجيل تمرين</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div><div class="field"><label>الخطة</label><select id="wlPlan">${plans.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}</select></div><div class="field"><label>ملاحظات</label><input id="wlNotes" placeholder="مثال: وزن أفضل من الأسبوع الماضي"></div><button class="btn btn-primary" style="width:100%;" onclick="logWorkout()">تسجيل</button>`);}
function logWorkout(){const planId=$('#wlPlan').value;const plan=(DB.health.workoutPlans||[]).find(p=>p.id===planId);if(!plan)return;if(!DB.health.workoutLog)DB.health.workoutLog=[];DB.health.workoutLog.push({id:uid(),date:todayKey(),planId,planName:plan.name,notes:$('#wlNotes').value.trim()});persist.health();closeModal();renderHealth();showToast('تم تسجيل التمرين! 💪','💪');addXP(30);checkAchievements();}
function renderBodyTab(c){
  const stats=DB.health.bodyStats||[];const last=stats.slice(-1)[0];
  c.innerHTML=`<div class="card" style="margin-bottom:16px;"><h3 class="section-title">📏 آخر قياساتك</h3>${!last?`<div class="muted" style="font-size:13.5px;padding:10px 0;">لم تُسجَّل قياسات بعد.</div>`:`<div class="grid grid-3" style="margin-bottom:10px;">${last.weight?`<div class="stat-card"><div class="stat-val">${last.weight}</div><div class="stat-lbl">الوزن (كج)</div></div>`:''} ${last.waist?`<div class="stat-card"><div class="stat-val">${last.waist}</div><div class="stat-lbl">الخصر (سم)</div></div>`:''} ${last.chest?`<div class="stat-card"><div class="stat-val">${last.chest}</div><div class="stat-lbl">الصدر (سم)</div></div>`:''} ${last.arms?`<div class="stat-card"><div class="stat-val">${last.arms}</div><div class="stat-lbl">الذراعين (سم)</div></div>`:''} ${last.bodyFat?`<div class="stat-card"><div class="stat-val">${last.bodyFat}%</div><div class="stat-lbl">دهون الجسم</div></div>`:''}</div><div class="muted" style="font-size:12px;">آخر تحديث: ${last.date||''}</div>`}<button class="btn btn-primary" style="margin-top:12px;" onclick="openBodyStatsModal()">+ تسجيل قياسات جديدة</button></div>${stats.length>=2?`<div class="card"><h3 class="section-title">📈 تاريخ الوزن</h3><div class="chart-bars">${stats.filter(s=>s.weight).slice(-8).map((s,i,arr)=>{const maxW=Math.max(...arr.map(x=>x.weight||0),1);return `<div class="chart-col"><div class="chart-fill" style="height:${Math.round((s.weight/maxW)*100)}%;background:linear-gradient(180deg,var(--success),#0d7a5f);"></div><span class="chart-lbl">${(s.date||'').slice(5)}</span></div>`;}).join('')}</div></div>`:''}`;
}
function openBodyStatsModal(){openModal(`<div class="modal-head"><h3>📏 قياسات الجسم</h3><button class="btn btn-icon btn-ghost" onclick="closeModal()">✕</button></div><div class="grid grid-2"><div class="field"><label>الوزن (كج)</label><input id="bsWeight" type="number" step="0.1" placeholder="0.0"></div><div class="field"><label>الخصر (سم)</label><input id="bsWaist" type="number" step="0.1" placeholder="0.0"></div><div class="field"><label>الصدر (سم)</label><input id="bsChest" type="number" step="0.1" placeholder="0.0"></div><div class="field"><label>الذراع (سم)</label><input id="bsArms" type="number" step="0.1" placeholder="0.0"></div><div class="field"><label>دهون الجسم %</label><input id="bsFat" type="number" step="0.1" placeholder="0.0"></div></div><button class="btn btn-primary" style="width:100%;" onclick="saveBodyStats()">حفظ القياسات</button>`);}
function saveBodyStats(){if(!DB.health.bodyStats)DB.health.bodyStats=[];DB.health.bodyStats.push({date:todayKey(),weight:parseFloat($('#bsWeight').value)||null,waist:parseFloat($('#bsWaist').value)||null,chest:parseFloat($('#bsChest').value)||null,arms:parseFloat($('#bsArms').value)||null,bodyFat:parseFloat($('#bsFat').value)||null});persist.health();closeModal();renderHealth();showToast('تم حفظ القياسات','📏');}
function openHealthFab(){if(HEALTH_TAB==='vitamins')openAddVitaminModal();else if(HEALTH_TAB==='nutrition')openAddMealModal();else if(HEALTH_TAB==='workout')openAddWorkoutPlanModal();else if(HEALTH_TAB==='body')openBodyStatsModal();}

/* EMERGENCY */
function openEmergencyMode(){
  const ov=$('#emergencyOverlay');
  const day=getDay(todayKey());
  const nextPrayer=OBLIGATORY.find(k=>!day[k])||'isha';
  const prayerNames={fajr:'الفجر',dhuhr:'الظهر',asr:'العصر',maghrib:'المغرب',isha:'العشاء'};
  const pendingGoal=DB.goals2026.find(g=>!g.done);
  ov.innerHTML=`<div style="text-align:center;margin-bottom:24px;"><div style="font-size:40px;margin-bottom:8px;">😮‍💨</div><h2 style="margin:0 0 6px;font-size:22px;font-weight:900;">أنت مرهق — لا بأس</h2><p class="muted" style="font-size:14px;">ركز فقط على هذه الثلاثة الآن</p></div><div class="emergency-card"><div class="emergency-item"><span style="font-size:26px;">🕌</span><div><div style="font-weight:800;font-size:15px;">الصلاة القادمة</div><div style="font-weight:700;font-size:16px;color:var(--primary);">${prayerNames[nextPrayer]||'الصلاة'}</div></div></div><div class="emergency-item"><span style="font-size:26px;">📖</span><div><div style="font-weight:800;font-size:15px;">الورد القرآني</div><div class="muted" style="font-size:13px;">صفحة واحدة فقط الآن</div></div></div><div class="emergency-item"><span style="font-size:26px;">🎯</span><div><div style="font-weight:800;font-size:15px;">أهم مهمة</div><div style="font-weight:700;font-size:14px;color:var(--primary);">${pendingGoal?esc(pendingGoal.title):'أنت محدّث في أهدافك ✅'}</div></div></div><div style="margin-top:18px;padding:14px;background:var(--bg-soft);border-radius:var(--radius-m);text-align:center;"><div style="font-weight:800;font-size:14px;color:var(--primary);">خطوة واحدة في كل مرة 🌿</div></div><button class="btn btn-primary" style="width:100%;margin-top:18px;" onclick="closeEmergencyMode()">أنا جاهز ✅</button></div>`;
  ov.classList.add('show');
}
function closeEmergencyMode(){$('#emergencyOverlay').classList.remove('show');}

function resetWaterToday(){if(!DB.health.water)DB.health.water={};DB.health.water[todayKey()]=0;persist.health();renderHealth();}
/* BOOT */
async function boot(){
  await loadAll();
  applyTheme();
  renderShell();
  renderApp();
  checkAchievements();
  window.addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='s'){
      e.preventDefault();
      const qd=$('#quickDump');
      if(qd&&qd.value.trim())saveQuickDump();
      else{Promise.all(Object.values(persist).map(fn=>fn())).then(()=>showToast('تم حفظ كل البيانات','💾'));}
    }
  });
  if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
}
document.addEventListener('DOMContentLoaded',boot);
</script>
</body>
